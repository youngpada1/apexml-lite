version: 2

models:
  - name: stg_meetings
    description: "Meetings — one row per meeting, deduplicated by meeting_key"
    columns:
      - name: meeting_key
        tests: [not_null, unique]

  - name: stg_championship_drivers
    description: "Championship driver standings — one row per driver per session"
    columns:
      - name: driver_number
        tests: [not_null]
      - name: session_key
        tests: [not_null]

  - name: stg_championship_teams
    description: "Championship team standings — one row per team per session"
    columns:
      - name: team_name
        tests: [not_null]
      - name: session_key
        tests: [not_null]

  - name: stg_sessions
    description: "Sessions — one row per session"
    columns:
      - name: session_key
        tests: [not_null, unique]
