version: 2

models:
  - name: dim_drivers
    description: "Driver dimension — one row per driver per session"
    columns:
      - name: session_key
        tests: [not_null]
      - name: driver_number
        tests: [not_null]
      - name: full_name
        tests: [not_null]
      - name: team_name
        tests: [not_null]

  - name: dim_sessions
    description: "Session dimension — one row per session with meeting context"
    columns:
      - name: session_key
        tests: [not_null, unique]
      - name: session_name
        tests: [not_null]

  - name: fct_laps
    description: "Lap times with tyre and driver context"
    columns:
      - name: session_key
        tests: [not_null]
      - name: driver_number
        tests: [not_null]
      - name: lap_number
        tests: [not_null]
      - name: lap_duration_s
        tests: [not_null]

  - name: fct_pit_stops
    description: "Pit stop events with tyre change context"
    columns:
      - name: session_key
        tests: [not_null]
      - name: driver_number
        tests: [not_null]
      - name: pit_duration_s
        tests: [not_null]

  - name: fct_race_positions
    description: "Driver positions throughout the race with grid and result context"
    columns:
      - name: session_key
        tests: [not_null]
      - name: driver_number
        tests: [not_null]
      - name: position
        tests: [not_null]

  - name: fct_stints
    description: "Stint aggregates with tyre degradation metrics"
    columns:
      - name: session_key
        tests: [not_null]
      - name: driver_number
        tests: [not_null]
      - name: stint_number
        tests: [not_null]
      - name: tyre_compound
        tests: [not_null]

  - name: fct_session_results
    description: "Final race results with grid position and places gained"
    columns:
      - name: session_key
        tests: [not_null]
      - name: driver_number
        tests: [not_null]

  - name: fct_overtakes
    description: "Overtake events with overtaking and overtaken driver context"
    columns:
      - name: session_key
        tests: [not_null]
      - name: driver_overtaking
        tests: [not_null]
      - name: driver_overtaken
        tests: [not_null]

  - name: fct_intervals
    description: "Gap to leader and interval to car ahead over time"
    columns:
      - name: session_key
        tests: [not_null]
      - name: driver_number
        tests: [not_null]
      - name: recorded_at
        tests: [not_null]

  - name: fct_weather
    description: "Weather conditions sampled throughout each session"
    columns:
      - name: session_key
        tests: [not_null]
      - name: recorded_at
        tests: [not_null]

  - name: fct_race_control
    description: "Race control messages — flags, safety cars, penalties"
    columns:
      - name: session_key
        tests: [not_null]
      - name: recorded_at
        tests: [not_null]
      - name: message
        tests: [not_null]

  - name: fct_car_data
    description: "High-frequency telemetry — speed, RPM, throttle, brake, DRS, gear"
    columns:
      - name: session_key
        tests: [not_null]
      - name: driver_number
        tests: [not_null]
      - name: recorded_at
        tests: [not_null]

  - name: fct_location
    description: "High-frequency GPS coordinates per driver"
    columns:
      - name: session_key
        tests: [not_null]
      - name: driver_number
        tests: [not_null]
      - name: recorded_at
        tests: [not_null]

  - name: dim_championship_drivers
    description: "Driver championship standings by year"
    columns:
      - name: driver_number
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: championship_position
        tests: [not_null]

  - name: dim_championship_teams
    description: "Constructor championship standings by year"
    columns:
      - name: team_name
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: championship_position
        tests: [not_null]
