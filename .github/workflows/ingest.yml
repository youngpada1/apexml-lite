name: Ingest OpenF1 Data

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC (after race weekend)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Install ingestion dependencies
        run: uv sync --directory ingestion

      - name: Install dbt dependencies
        run: uv sync --directory dbt

      - name: Write private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/rsa_key.p8
          chmod 600 /tmp/rsa_key.p8

      - name: Run ingestion
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/rsa_key.p8
          SNOWFLAKE_DATABASE: APEXML_DB
          SNOWFLAKE_SCHEMA: RAW
          SNOWFLAKE_WAREHOUSE: APEXML_WH
          SNOWFLAKE_ROLE: APEXML_WRITER
        run: |
          cd ingestion/src
          uv run --project .. python load_sessions.py
          uv run --project .. python load_drivers.py
          uv run --project .. python load_meetings.py
          uv run --project .. python load_laps.py
          uv run --project .. python load_stints.py
          uv run --project .. python load_pit.py
          uv run --project .. python load_position.py
          uv run --project .. python load_intervals.py
          uv run --project .. python load_race_control.py
          uv run --project .. python load_weather.py
          uv run --project .. python load_team_radio.py
          uv run --project .. python load_overtakes.py
          uv run --project .. python load_session_result.py
          uv run --project .. python load_starting_grid.py
          uv run --project .. python load_championship_drivers.py
          uv run --project .. python load_championship_teams.py
          uv run --project .. python load_car_data.py
          uv run --project .. python load_location.py

      - name: Write dbt profiles
        run: |
          cat > dbt/profiles.yml << EOF
          apexml:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                private_key_path: /tmp/rsa_key.p8
                role: APEXML_TRANSFORMER
                database: APEXML_DB
                warehouse: APEXML_WH
                schema: RAW
                threads: 4
          EOF

      - name: Run dbt
        run: |
          cd dbt
          uv run dbt run
          uv run dbt test
