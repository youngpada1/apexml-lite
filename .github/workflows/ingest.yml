name: Ingest OpenF1 Data

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC (after race weekend)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Ingestion mode'
        required: true
        default: 'new'
        type: choice
        options:
          - new
          - all

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Install ingestion dependencies
        run: uv sync --directory ingestion

      - name: Install dbt dependencies
        run: uv sync --directory dbt

      - name: Write private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/rsa_key.p8
          chmod 600 /tmp/rsa_key.p8

      - name: Run ingestion
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/rsa_key.p8
          SNOWFLAKE_DATABASE: APEXML_DB
          SNOWFLAKE_SCHEMA: RAW
          SNOWFLAKE_WAREHOUSE: APEXML_WH
          SNOWFLAKE_ROLE: APEXML_WRITER
        run: |
          MODE=${{ github.event.inputs.mode || 'new' }}
          uv run --directory ingestion python -m ingestion.src.main --$MODE

      - name: Write dbt profiles
        run: |
          cat > dbt/profiles.yml << EOF
          apexml:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                private_key_path: /tmp/rsa_key.p8
                role: APEXML_TRANSFORMER
                database: APEXML_DB
                warehouse: APEXML_WH
                schema: RAW
                threads: 4
          EOF

      - name: Run dbt
        run: |
          cd dbt
          uv run dbt run
          uv run dbt test
